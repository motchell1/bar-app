<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Bar App</title>

<!-- Link to external CSS -->
<link rel="stylesheet" href="css/styles.css">
</head>
<body>
<div class="home-toolbar">
  <div class="toolbar-inner">
	<span class="app-title">Bar App</span>
	<button class="hamburger-button">☰</button>
  </div>
</div>
<div class="app-container">
  <div id="home-screen">
    <div id="home-bars"></div>
  </div>

  <div id="bars-screen" style="display:none;">
    <div class="bars-search-wrap">
      <input id="bars-search-input" class="bars-search-input" type="search" placeholder="Search bars or neighborhoods" aria-label="Search bars" />
    </div>
    <div id="bars-list"></div>
  </div>

  <div id="favorites-screen" style="display:none;">
    <div id="favorites-list"></div>
  </div>
  
  <div id="side-menu-overlay" class="side-menu-overlay"></div>
  
  <div id="side-menu" class="side-menu">
    <div class="side-menu-header">Filters</div>
	
	<div class="side-menu-content">
		<div id="special-type-filters" class="filter-section">
			<div class="filter-section-title">Special Type</div>
			<div class="filter-row">
				<input type="checkbox" id="drinkFilter" />
				
				<label for="filter-drinks">Drinks</label>
				<span class="side-menu-type-icon" data-lucide="beer"></span>
			</div>
				
			<div class="filter-row">
				<input type="checkbox" id="foodFilter" /> 
				
				<label for="filter-food">Food</label>
				<span class="side-menu-type-icon" data-lucide="utensils"></span>
			</div>
		</div>
		<div id="neighborhood-filters" class="filter-section">
			<div class="filter-section-title">Neighborhood</div>
		</div>
	</div>
	<div class="side-menu-footer">
		<hr class="menu-divider" />
		<button class="apply-filters-button" id="applyFiltersBtn">Apply Filters</button>
	</div>
  </div>
  

  <div id="detail-screen" style="display:none;">
    <img id="detail-image" class="detail-image" src="" alt="Bar Image">
    <div class="detail-header">
      <button class="back-button" onclick="showHome()">←</button>
      <span id="detail-name"></span>
    </div>
    <div class="detail-content">

      <div class="detail-section">
        <h3>Open Hours</h3>
        <table id="detail-hours" class="open-hours-table"></table>
      </div>

      <div class="detail-section">
        <h3>Specials</h3>
        <div id="detail-specials" class="detail-specials"></div>
      </div>

    </div>
  </div>

  <div id="special-screen" style="display:none;">
    <div class="special-toolbar">
      <button class="special-back-button" onclick="showPreviousScreen()" aria-label="Back">
        <span data-lucide="arrow-left"></span>
      </button>
      <span class="special-toolbar-title">SPECIAL</span>
      <span class="special-toolbar-spacer" aria-hidden="true"></span>
    </div>

    <div class="special-content">
      <img id="special-bar-image" class="special-bar-image" src="" alt="Bar image">

      <div id="special-card" class="special-card"></div>

      <div class="special-report-section">
        <h3>Report this special</h3>
        <p class="special-report-copy">
          Think this special is inaccurate, unavailable, or out of date?
        </p>
        <button id="special-report-toggle" class="special-report-toggle" type="button">
          Report this special
        </button>

        <form id="special-report-form" class="special-report-form" style="display:none;" onsubmit="submitSpecialReport(event)">
          <label for="special-report-reason" class="special-report-label">Reason for review</label>
          <select id="special-report-reason" class="special-report-select" required>
            <option value="" selected disabled>Select a reason</option>
            <option value="Special is no longer active">Special is no longer active</option>
            <option value="Special details are inaccurate">Special details are inaccurate</option>
            <option value="Other">Other</option>
          </select>
          <label for="special-report-comment" class="special-report-label">Comments (optional)</label>
          <textarea id="special-report-comment" class="special-report-comment" rows="3" placeholder="Add any details here"></textarea>
          <button class="special-report-submit" type="submit">Submit</button>
        </form>
      </div>
    </div>
  </div>
</div>

<nav class="bottom-taskbar" aria-label="Primary">
  <button class="taskbar-tab active" type="button" aria-label="Specials" data-tab="specials">
    <span class="taskbar-icon" data-lucide="badge-dollar-sign"></span>
    <span class="taskbar-label">Specials</span>
  </button>
  <button class="taskbar-tab" type="button" aria-label="Bars" data-tab="bars">
    <span class="taskbar-icon" data-lucide="beer"></span>
    <span class="taskbar-label">Bars</span>
  </button>
  <button class="taskbar-tab" type="button" aria-label="Favorites" data-tab="favorites">
    <span class="taskbar-icon" data-lucide="star"></span>
    <span class="taskbar-label">Favorites</span>
  </button>
</nav>
<script src="https://cdn.jsdelivr.net/npm/lucide@0.575.0/dist/umd/lucide.js"></script>
<script> lucide.createIcons();</script>
<!-- Link to external JS -->
<script src="js/app.js"></script>
</body>
</html>
